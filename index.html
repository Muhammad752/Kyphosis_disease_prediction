<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kyphosis Prediction Interface</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
    }
    .card {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 28px;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }
    p {
      line-height: 1.6;
      margin: 8px 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }
    .field label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
    }
    .field input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .primary {
      background: #2563eb;
      color: white;
    }
    .secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .result {
      margin-top: 22px;
      padding: 18px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      display: none;
    }
    .positive {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .negative {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    .path {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      display: none;
    }
    .path ol {
      margin: 0;
      padding-left: 20px;
      line-height: 1.7;
    }
    .note {
      font-size: 14px;
      color: #6b7280;
      margin-top: 12px;
    }
    .footer {
      font-size: 14px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Kyphosis Disease Prediction</h1>
      <p>This interface applies your trained decision-tree rules to estimate the predicted class.</p>
      <p><strong>Input variables:</strong> Start, Age, Number</p>

      <div class="grid">
        <div class="field">
          <label for="start">Start (topmost vertebra)</label>
          <input type="number" id="start" step="any" placeholder="Enter Start value" />
        </div>
        <div class="field">
          <label for="age">Age (in months)</label>
          <input type="number" id="age" step="any" placeholder="Enter Age value" />
        </div>
        <div class="field">
          <label for="number">Number (of vertebrae)</label>
          <input type="number" id="number" step="any" placeholder="Enter Number value" />
        </div>
      </div>

      <div class="actions">
        <button class="primary" onclick="predictKyphosis()">Predict</button>
        <button class="secondary" onclick="resetForm()">Reset</button>
      </div>

      <div id="result" class="result"></div>
      <div id="path" class="path"></div>

    </div>
  </div>

  <script>
    function treePredict(start, age, number) {
      const path = [];
      let predictedClass;

      if (start <= 8.5) {
        path.push('Start <= 8.50');

        if (age <= 11.5) {
          path.push('Age <= 11.50');
          predictedClass = 0;
        } else {
          path.push('Age > 11.50');

          if (start <= 5.5) {
            path.push('Start <= 5.50');

            if (age <= 16.5) {
              path.push('Age <= 16.50');
              predictedClass = 1;
            } else {
              path.push('Age > 16.50');

              if (age <= 72.0) {
                path.push('Age <= 72.00');
                predictedClass = 0;
              } else {
                path.push('Age > 72.00');

                if (age <= 130.5) {
                  path.push('Age <= 130.50');

                  if (age <= 101.0) {
                    path.push('Age <= 101.00');

                    if (number <= 4.5) {
                      path.push('Number <= 4.50');
                      predictedClass = 0;
                    } else {
                      path.push('Number > 4.50');
                      predictedClass = 1;
                    }
                  } else {
                    path.push('Age > 101.00');
                    predictedClass = 1;
                  }
                } else {
                  path.push('Age > 130.50');
                  predictedClass = 0;
                }
              }
            }
          } else {
            path.push('Start > 5.50');
            predictedClass = 1;
          }
        }
      } else {
        path.push('Start > 8.50');

        if (start <= 14.5) {
          path.push('Start <= 14.50');

          if (age <= 55.0) {
            path.push('Age <= 55.00');
            predictedClass = 0;
          } else {
            path.push('Age > 55.00');

            if (age <= 96.5) {
              path.push('Age <= 96.50');

              if (start <= 11.0) {
                path.push('Start <= 11.00');
                predictedClass = 0;
              } else {
                path.push('Start > 11.00');
                predictedClass = 1;
              }
            } else {
              path.push('Age > 96.50');

              if (start <= 10.5) {
                path.push('Start <= 10.50');

                if (number <= 3.5) {
                  path.push('Number <= 3.50');
                  predictedClass = 1;
                } else {
                  path.push('Number > 3.50');
                  predictedClass = 0;
                }
              } else {
                path.push('Start > 10.50');

                if (age <= 148.5) {
                  path.push('Age <= 148.50');
                  predictedClass = 0;
                } else {
                  path.push('Age > 148.50');

                  if (age <= 157.5) {
                    path.push('Age <= 157.50');
                    predictedClass = 1;
                  } else {
                    path.push('Age > 157.50');
                    predictedClass = 0;
                  }
                }
              }
            }
          }
        } else {
          path.push('Start > 14.50');
          predictedClass = 0;
        }
      }

      return { predictedClass, path };
    }

    function predictKyphosis() {
      const start = parseFloat(document.getElementById('start').value);
      const age = parseFloat(document.getElementById('age').value);
      const number = parseFloat(document.getElementById('number').value);
      const resultBox = document.getElementById('result');
      const pathBox = document.getElementById('path');

      if (Number.isNaN(start) || Number.isNaN(age) || Number.isNaN(number)) {
        resultBox.style.display = 'block';
        resultBox.className = 'result positive';
        resultBox.textContent = 'Please enter valid numeric values for Start, Age, and Number.';
        pathBox.style.display = 'none';
        return;
      }

      const { predictedClass, path } = treePredict(start, age, number);
      const label = predictedClass === 1 ? 'Kyphosis Present' : 'Kyphosis Absent';

      resultBox.style.display = 'block';
      resultBox.className = predictedClass === 1 ? 'result positive' : 'result negative';
      resultBox.textContent = `Predicted class: ${predictedClass} — ${label}`;

      pathBox.style.display = 'block';
      pathBox.innerHTML = `
        <strong>Decision path:</strong>
        <ol>${path.map(step => `<li>${step}</li>`).join('')}</ol>
      `;
    }

    function resetForm() {
      document.getElementById('start').value = '';
      document.getElementById('age').value = '';
      document.getElementById('number').value = '';
      document.getElementById('result').style.display = 'none';
      document.getElementById('path').style.display = 'none';
    }
  </script>
</body>
</html>
